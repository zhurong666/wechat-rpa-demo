name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 JDK 17（项目要求）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 缓存 Gradle 加速构建
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. 赋予 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew

      # 5. 构建 Debug APK
      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --stacktrace

      # 6. 上传 Debug APK 为 Artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # 7. （可选）构建 Release APK（未签名）
      - name: Build Release APK (unsigned)
        working-directory: android-app
        run: ./gradlew assembleRelease --stacktrace

      # 8. 上传 Release APK 为 Artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned-${{ github.sha }}
          path: android-app/app/build/outputs/apk/release/*.apk
          retention-days: 30